<p class="visually-hidden" id="tags-desc">
  This post has been tagged with the following tag{% if tags.length > 1 %}s{% endif %}.
</p>
<ul class="tags-list" aria-describedby="tags-desc">
  {% for tag in tags %}
  <li>
    <a href="/tags/{{ tag | slugify }}/"
      >#{{ tag | title | replace(' ', '') }}</a
    >
  </li>
  {% endfor %}
</ul>
