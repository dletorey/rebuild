<li>  
  <a class="card" href="{{ item.url }}">
    <header>
      <h2>{{ item.data.title }}{%if item.data.subTitle %}<br><span>{{item.data.subTitle}}</span>{% endif %}</h2>
    </header>
    <p>{{ item.data.description }}</p>
    <small><time datetime="{{ item.data.date | w3DateFilter }}">{{ item.data.date | dateFilter }}</time></small>
  </a>
</li>
